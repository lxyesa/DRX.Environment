<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaxHub - 找回密码</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="/css/global.css" rel="stylesheet">
    <script src="/js/global.js"></script>
    <script src="/js/topbar.js" defer></script>
    <link href="/css/login.css" rel="stylesheet">
</head>

<body class="has-global-topbar">
    <div class="card" role="main" aria-labelledby="fpTitle">
        <div class="brand">
            <div>
                <h1 id="fpTitle">找回密码</h1>
                <p class="lead">输入你的用户名或注册邮箱，我们将向你发送一封重置邮件。</p>
            </div>
        </div>

        <!-- 输入阶段 -->
        <form id="fpForm" autocomplete="on" novalidate>
            <div class="field">
                <label for="identifier">用户名 / 邮箱</label>
                <input id="identifier" name="identifier" type="text"
                       placeholder="请输入用户名或邮箱" required autocomplete="username" />
            </div>
            <div id="error" class="hint" aria-live="polite"
                 style="color:rgba(255,100,100,0.9);display:none"></div>

            <button type="submit" class="btn" id="submitBtn">发送重置邮件</button>
            <button type="button" id="backBtn" class="btn ghost">返回登录</button>
        </form>

        <!-- 发送成功阶段（初始隐藏） -->
        <div id="successPanel" style="display:none; text-align:center; padding: 8px 0;">
            <span class="material-icons"
                  style="font-size:48px;color:#58a6ff;display:block;margin-bottom:12px;">mark_email_read</span>
            <p id="successMsg" style="color:#e6edf3;font-size:15px;line-height:1.7;margin-bottom:24px;">
                如果账号存在且邮箱可用，我们已发送重置邮件，<br>请在 10 分钟内完成重置。
            </p>
            <p id="cooldownTip" style="color:#8b949e;font-size:13px;margin-bottom:16px;display:none">
                如未收到，<span id="cooldownTimer">30</span> 秒后可重新发送。
            </p>
            <button id="resendBtn" class="btn ghost" disabled>重新发送</button>
            <a href="/login" class="btn" style="display:block;margin-top:12px;text-align:center;text-decoration:none;">返回登录</a>
        </div>
    </div>

    <script src="/js/forgot-password.js"></script>
</body>

</html>
