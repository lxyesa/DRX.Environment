<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaxHub - 重置密码</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="/views/css/global.css" rel="stylesheet">
    <script src="/views/js/global.js"></script>
    <script src="/views/js/topbar.js" defer></script>
    <link href="/views/css/login.css" rel="stylesheet">
</head>

<body class="has-global-topbar">
    <div class="card" role="main" aria-labelledby="rpTitle">

        <!-- 加载中 -->
        <div id="loadingPanel" style="text-align:center;padding:32px 0;">
            <span class="material-icons"
                  style="font-size:40px;color:#8b949e;display:block;margin-bottom:12px;animation:spin 1s linear infinite;">
                autorenew
            </span>
            <p style="color:#8b949e;font-size:14px;">正在验证重置链接…</p>
        </div>

        <!-- 链接无效 -->
        <div id="invalidPanel" style="display:none;text-align:center;padding:16px 0;">
            <span class="material-icons"
                  style="font-size:48px;color:#f85050;display:block;margin-bottom:12px;">error_outline</span>
            <h2 id="rpTitle" style="color:#e6edf3;font-size:18px;margin:0 0 10px;">链接无效或已过期</h2>
            <p id="invalidMsg" style="color:#8b949e;font-size:14px;line-height:1.7;margin-bottom:24px;">
                重置链接已失效，请重新发起找回申请。
            </p>
            <a href="/forgot-password" class="btn"
               style="display:inline-block;text-decoration:none;text-align:center;">重新申请</a>
        </div>

        <!-- 重置表单 -->
        <div id="formPanel" style="display:none;">
            <div class="brand">
                <div>
                    <h1 id="rpTitle" style="font-size:22px;">重置密码</h1>
                    <p id="accountHint" class="lead" style="font-size:13px;color:#8b949e;">
                        正在重置账号密码
                    </p>
                </div>
            </div>

            <form id="rpForm" autocomplete="off" novalidate>
                <div class="field">
                    <label for="newPassword">新密码</label>
                    <input id="newPassword" name="newPassword" type="password"
                           placeholder="至少 8 位" required autocomplete="new-password" />
                </div>
                <div class="field">
                    <label for="confirmPassword">确认新密码</label>
                    <input id="confirmPassword" name="confirmPassword" type="password"
                           placeholder="再次输入密码" required autocomplete="new-password" />
                </div>
                <div id="error" class="hint" aria-live="polite"
                     style="color:rgba(255,100,100,0.9);display:none"></div>

                <button type="submit" class="btn" id="submitBtn">确认重置</button>
                <a href="/login" class="btn ghost"
                   style="display:block;margin-top:10px;text-align:center;text-decoration:none;">取消，返回登录</a>
            </form>
        </div>

        <!-- 重置成功 -->
        <div id="successPanel" style="display:none;text-align:center;padding:16px 0;">
            <span class="material-icons"
                  style="font-size:48px;color:#3fb950;display:block;margin-bottom:12px;">check_circle_outline</span>
            <h2 style="color:#e6edf3;font-size:18px;margin:0 0 10px;">密码重置成功</h2>
            <p style="color:#8b949e;font-size:14px;line-height:1.7;margin-bottom:24px;">
                你的密码已更新，所有设备的登录状态已失效，<br>请使用新密码重新登录。
            </p>
            <p id="autoRedirect" style="color:#6e7681;font-size:12px;margin-bottom:16px;">
                <span id="countdownNum">5</span> 秒后自动跳转到登录页…
            </p>
            <a href="/login" class="btn"
               style="display:inline-block;text-decoration:none;text-align:center;">立即登录</a>
        </div>

    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="/views/js/reset-password.js"></script>
</body>

</html>
